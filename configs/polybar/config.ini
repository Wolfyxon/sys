[colors]
;background = #282A2E
background = #27282A
background-alt = #373B41
foreground = #FF0000
primary = #A90000
secondary = #831111
alert = #FF0000
disabled = #707880
white = #FFFFFF
purple = #7D00FF
darkred = #960000
darkpurple = #2C2240
black = #00000

[bar/main]
width = 98%
height = 12pt
radius = 2
offset-x = 1%
offset-y = 0.5%
dpi = 132
monitor = ${env:MONITOR:}

background = #00000000
foreground = ${colors.foreground}

line-size = 1pt

border-size = 0pt
border-color = ${colors.background}

padding-left = 1
padding-right = 1


module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = TerminessTTF Nerd Font:pixelsize=12;3
;font-0 = monospace:pixelsize=8;2

modules-left = icon xworkspaces memory cpu mic
modules-center = xwindow
modules-right = pulseaudio backlight cputemp battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right
; tray-background = ${colors.darkred}
tray-foreground = #000000
tray-padding = 1


; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

override-redirect = true

[module/icon]
type = custom/text
content = ÔĆÉ
module-margin = 2

[module/trianglestart]
type = custom/text
content = Ó≠Į
format-foreground = ${colors.darkred}

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
format = %{F#1B1B1B}Óāĺ%{F#FF0000}%{B#1B1B1B}   <label>   %{B-}%{F#1B1B1B}Óāľ
label = %title:0:60:...%
;label-minlen = 60
format-padding = 4

;[module/filesystem];type = internal/fs
;interval = 25

;mount-0 = /

;label-mounted = %{F#FF0006}%mountpoint%%{F-} %percentage_used%%

;label-unmounted = %mountpoint% not mounted
;label-unmounted-foreground = ${colors.disabled}

[module/cava]
type = custom/script
tail = true
exec = ~/.local/bin/polybar_cava
format = <label>
format-font = 5
label = %output%
interval = 5

[module/pulseaudio]
type = internal/pulseaudio
format-volume-background = ${colors.black}
format-volume-prefix = "ÔÄ® "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = "Ô™Ä "
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = Ô†č %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "Ôčõ "
warn-percentage = 90
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%% %mb_free% Ó©≤

[module/cpu]
type = internal/cpu
interval = 2
format-prefix-foreground = ${colors.primary}
label = Ô°ö %percentage:2%%

[module/cputemp]
type = custom/script
exec = .local/bin/cputemp
tail = true
interval = 2
format = Ôčá <label>¬įC
label = "%output%"

[module/mic]
type = custom/script
tail = true
exec = python ~/.local/bin/micstatus.py
format = <label>
format-font = 5
label = %output%
interval = 3

;[network-base]
;type = internal/network
;interval = 5
;format-connected = <label-connected>
;format-disconnected = <label-disconnected>
;label-disconnected = %{F#B82A35}%ifname%%{F#707880} disconnected

;[module/wlan]
;inherit = network-base
;interface-type = wireless
;label-connected = %{F#BF3F41}%ifname%%{F-} %essid% %local_ip%

;[module/eth]
;inherit = network-base
;interface-type = wired
;label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/battery]
type = internal/battery
full-at = 99
time-format = %H:%M:%S
battery = BAT0
adapter = L24X4PC0
poll-interval = 1
label-full = %percentage%%
format-full = ÔČÄ  <label-full>
label-charging = %percentage%% %time%
label-discharging = %percentage%% %time%
format-discharging = <ramp-capacity>  <label-discharging>
format-charging = ÔÉß <ramp-capacity>  <label-charging>
ramp-capacity-0 = ÔČĄ 
ramp-capacity-1 = ÔČÉ 
ramp-capacity-2 = ÔČā 
ramp-capacity-3 = ÔČĀ 
ramp-capacity-4 = ÔČÄ 

[module/date]
type = internal/date
interval = 1
date =  ÔôŹ %H:%M:%S : ÔĀ≥ %d-%m-%Y
;date-alt = %d-%m-%Y %H:%M:%S
label =  %{A1:kitty sh -c "calcurse; kitty @ close-window":}Óāĺ%{F#FFFFFF}%{B#A90000} %date% %{B-}%{F#A90000}Óāł%{A}
label-foreground = ${colors.primary}
;format-background = ${colors.primary}

[module/backlight]
type = internal/backlight
card = amdgpu_bl1
use-actual-brightness = true
poll-interval = 0
label = ÔźÄ %percentage%%
; Enable changing the backlight with the scroll wheel
; NOTE: This may require additional configuration on some systems. Polybar will
; write to `/sys/class/backlight/${self.card}/brightness` which requires polybar
; to have write access to that file.
; DO NOT RUN POLYBAR AS ROOT. 
; The recommended way is to add the user to the
; `video` group and give that group write-privileges for the `brightness` file.
; See the ArchWiki for more information:
; https://wiki.archlinux.org/index.php/Backlight#ACPI
; Default: false
enable-scroll = true
scroll-interval = 5

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
